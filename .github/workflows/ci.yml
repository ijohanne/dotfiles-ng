name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31.10.1
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            extra-platforms = aarch64-linux
            access-tokens = github.com=${{ secrets.GH_FLAKE_TOKEN }}

      - uses: cachix/cachix-action@v17
        with:
          name: nix-community
          skipPush: true

      - name: Check flake
        run: nix flake show

      - name: Evaluate current-system checks
        run: nix eval .#checks --apply builtins.attrNames > /dev/null

  build-darwin:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31.10.1
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GH_FLAKE_TOKEN }}

      - name: Build macbook configuration
        run: nix build .#darwinConfigurations.macbook.system --dry-run

  build-linux-hosts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ij-desktop
            attr: .#nixosConfigurations.ij-desktop.config.system.build.toplevel
          - name: pakhet
            attr: .#nixosConfigurations.pakhet.config.system.build.toplevel
          - name: goose
            attr: .#nixosConfigurations.goose.config.system.build.toplevel
          - name: khosu
            attr: .#nixosConfigurations.khosu.config.system.build.toplevel
          - name: anubis
            attr: .#nixosConfigurations.anubis.config.system.build.toplevel
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31.10.1
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GH_FLAKE_TOKEN }}

      - uses: cachix/cachix-action@v17
        with:
          name: nix-community
          skipPush: true

      - name: Build ${{ matrix.name }} configuration
        run: nix build '${{ matrix.attr }}' --dry-run

  build-linux-images:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: bhyve
            attr: .#images.bhyve
          - name: bhyve-server
            attr: .#images.bhyve-server
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31.10.1
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GH_FLAKE_TOKEN }}

      - uses: cachix/cachix-action@v17
        with:
          name: nix-community
          skipPush: true

      - name: Build ${{ matrix.name }} image
        run: nix build '${{ matrix.attr }}' --dry-run

  build-arm-images:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: rpi4-stable
            attr: .#nixosConfigurations.rpi4-stable.config.system.build.toplevel
          - name: rpi4-unstable
            attr: .#nixosConfigurations.rpi4-unstable.config.system.build.toplevel
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31.10.1
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            extra-platforms = aarch64-linux
            access-tokens = github.com=${{ secrets.GH_FLAKE_TOKEN }}

      - uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - uses: cachix/cachix-action@v17
        with:
          name: nix-community
          skipPush: true

      - name: Build ${{ matrix.name }} image
        run: nix build '${{ matrix.attr }}' --dry-run

  build-arm-vm:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31.10.1
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            extra-platforms = aarch64-linux
            access-tokens = github.com=${{ secrets.GH_FLAKE_TOKEN }}

      - uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - uses: cachix/cachix-action@v17
        with:
          name: nix-community
          skipPush: true

      - name: Build rtsp-dev-vm image
        run: nix build .#images.rtsp-dev-vm --dry-run
